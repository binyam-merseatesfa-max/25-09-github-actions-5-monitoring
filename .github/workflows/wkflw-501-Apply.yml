name: Terraform Apply GitHub-Actions Docker-Website deploy

on: [push,workflow_dispatch]

jobs:
  Apply-Terraform:
    runs-on: ubuntu-latest

    if: github.event_name == 'push'
    steps:
      - name: Hi test
        run: |
          echo "Hi 202 test call, running by push ..."
          date

      - name: Checkout
        uses: actions/checkout@v7
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1
      
      - name: Terraform Init
        run: terraform init
            
      - name: Terraform Apply
        run: terraform apply --auto-approve

      - name: ssh setup
        run: |
            mkdir -p ~/.ssh
            echo "${{secrets.SSH_PRIVATE_KEY_101}}" > ~/.ssh/myKeys
            chmod 600 ~/.ssh/myKeys

      - name: Configure known_hosts (typ1)
        run: |
          FAILED_IPS=()

          for ip in $(terraform output -json public_ips_typ1 | jq -r ".[]"); do
            echo "Waiting for SSH on $ip..."
            success=false
            for i in {1..10}; do
              if timeout 5 ssh-keyscan -H "$ip" >> ~/.ssh/known_hosts 2>/dev/null; then
                echo "  $ip is ready"
                success=true
                break
              fi
              echo "  retry $i/10..."
              sleep 5
            done

            if [ "$success" = false ]; then
              echo "::error::Could not reach $ip after 10 attempts"
              FAILED_IPS+=("$ip")
            fi
          done

          if [ ${#FAILED_IPS[@]} -gt 0 ]; then
            echo "The following IPs were unreachable: ${FAILED_IPS[*]}"
            exit 1
          fi

      - name: install docker on ec2 & extend user recht on Docker, on_typ1
        run: |
            for ip in $(terraform output -json public_ips_typ1 | jq -r ".[]"); do
            ssh -i ~/.ssh/myKeys ubuntu@$ip "sudo apt update && sudo apt install docker.io -y"
            ssh -i ~/.ssh/myKeys ubuntu@$ip "sudo usermod -aG docker ubuntu"
            done

      - name: install & run node-exporter on typ1
        run: |
            for ip in $(terraform output -json public_ips_typ1 | jq -r ".[]"); do
              ssh -i ~/.ssh/myKeys ubuntu@$ip "docker rm -f node-exporter || true; docker run -d --name node-exporter -p 9100:9100 prom/node-exporter"
            done


      - name: Configure known_hosts (typ2)
        run: |
          FAILED_IPS=()

          for ip in $(terraform output -json public_ips_typ2 | jq -r ".[]"); do
            echo "Waiting for SSH on $ip..."
            success=false
            for i in {1..10}; do
              if timeout 5 ssh-keyscan -H "$ip" >> ~/.ssh/known_hosts 2>/dev/null; then
                echo "  $ip is ready"
                success=true
                break
              fi
              echo "  retry $i/10..."
              sleep 5
            done

            if [ "$success" = false ]; then
              echo "::error::Could not reach $ip after 10 attempts"
              FAILED_IPS+=("$ip")
            fi
          done

          if [ ${#FAILED_IPS[@]} -gt 0 ]; then
            echo "The following IPs were unreachable: ${FAILED_IPS[*]}"
            exit 1
          fi




      - name: install docker on ec2 & extend user recht on Docker, on_typ2
        run: |
            for ip in $(terraform output -json public_ips_typ2 | jq -r ".[]"); do
            ssh -i ~/.ssh/myKeys ubuntu@$ip "sudo apt update && sudo apt install docker.io -y"
            ssh -i ~/.ssh/myKeys ubuntu@$ip "sudo usermod -aG docker ubuntu"
            done

      - name: pre-create prometheus.yml on ec2 instances, on_typ2
        run: |
            pwd
            ls -la
            ls -la Frontend/files/ || echo "Frontend/files not found here"

      - name: create prometheus.yml with all node_exporter targets, on_typ2
        run: |
            targets=""
            for ip in $(terraform output -json public_ips_typ1 | jq -r ".[]"); do
              targets="$targets\"$ip:9100\", "
            done
            targets="${targets%, }"

            sed "s|\${node_exporter_targets}|$targets|" files/prometheus.yml.tpl > /tmp/prometheus.yml

            for ip in $(terraform output -json public_ips_typ2 | jq -r ".[]"); do
              scp -i ~/.ssh/myKeys /tmp/prometheus.yml ubuntu@$ip:/home/ubuntu/prometheus.yml
            done

      - name: run prometheus container on typ2
        run: |
            for ip in $(terraform output -json public_ips_typ2 | jq -r ".[]"); do
              ssh -i ~/.ssh/myKeys ubuntu@$ip "docker rm -f prometheus || true; docker run -d --name prometheus -p 9090:9090 -v /home/ubuntu/prometheus.yml:/etc/prometheus/prometheus.yml prom/prometheus"
            done

      - name: install & run grafana on typ2
        run: |
            for ip in $(terraform output -json public_ips_typ2 | jq -r ".[]"); do
              ssh -i ~/.ssh/myKeys ubuntu@$ip "docker rm -f grafana || true; docker run -d --name grafana -p 3000:3000 -v grafana-data:/var/lib/grafana grafana/grafana-enterprise"
            done

  Terraform-say-hi-bye:
        runs-on: ubuntu-latest
        if: github.event_name == 'workflow_dispatch'

        steps:   
           - name: Bye
             run: |
                echo "Just saying hi & bye, no apply, by workflow_dispatch ..."
                date